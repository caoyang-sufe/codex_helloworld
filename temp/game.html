<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>炉石酒馆卡牌游戏</title>
    <style>
        body {
            background: #23272e;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0 0 0;
            background: linear-gradient(135deg, #2b2d3c 0%, #1a1c22 100%);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
            border: 4px solid #3e4155;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            position: relative;
        }
        .money {
            background: linear-gradient(90deg, #3e2d1c 60%, #ffd700 100%);
            border-radius: 12px;
            padding: 10px 28px;
            font-size: 22px;
            color: #fffbe6;
            box-shadow: 0 2px 8px #0008;
            border: 2px solid #ffd700;
            position: absolute;
            left: 30px;
            bottom: 30px;
            z-index: 10;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .timer-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-right: 30px;
            gap: 8px;
        }
        .timer {
            font-size: 24px;
            background: linear-gradient(90deg, #1e2a3a 60%, #00eaff 100%);
            border-radius: 10px;
            padding: 10px 28px;
            color: #fff;
            font-weight: bold;
            border: 2px solid #00eaff;
            box-shadow: 0 2px 8px #0008;
        }
        .start-btn {
            background: linear-gradient(90deg, #00eaff 60%, #00b6c9 100%);
            color: #23272e;
            border: none;
            border-radius: 8px;
            padding: 8px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px #0006;
        }
        .start-btn:hover {
            background: linear-gradient(90deg, #00b6c9 60%, #00eaff 100%);
            box-shadow: 0 4px 16px #00eaff44;
        }
        .sell-area {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 120px;
            height: 160px;
            background: linear-gradient(135deg, #3e2d1c 60%, #ffd700 100%);
            border: 2px dashed #ffd700;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fffbe6;
            font-size: 20px;
            z-index: 10;
            font-weight: bold;
            box-shadow: 0 2px 8px #0008;
        }
        .shop {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 18px;
            position: relative;
        }
        .shop-refresh-btn {
            position: absolute;
            left: -140px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(90deg, #ffd700 60%, #fffbe6 100%);
            color: #23272e;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px #0006;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .shop-refresh-btn:hover {
            background: linear-gradient(90deg, #fffbe6 60%, #ffd700 100%);
            box-shadow: 0 4px 16px #ffd70044;
        }
        .battlefield {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 18px;
            min-height: 170px;
        }
        .hand {
            display: flex;
            justify-content: center;
            gap: 14px;
            min-height: 160px;
        }
        .card {
            background: linear-gradient(135deg, #fffbe6 60%, #ffd700 100%);
            border-radius: 14px;
            box-shadow: 0 4px 18px #0008, 0 0 0 4px #ffd70033;
            padding: 8px 8px 0 8px;
            width: 110px;
            height: 150px;
            text-align: center;
            position: relative;
            cursor: grab;
            transition: transform 0.18s, box-shadow 0.18s;
            color: #23272e;
            user-select: none;
            border: 2px solid #ffd700;
        }
        .card.dragging {
            opacity: 0.6;
            box-shadow: 0 0 0 6px #00eaff;
            z-index: 100;
        }
        .card img {
            width: 90px;
            height: 120px;
            object-fit: contain;
            border-radius: 8px;
            background: #eee;
            box-shadow: 0 2px 8px #0004;
            border: 2px solid #ffd70044;
        }
        .card-name {
            margin-top: 2px;
            font-size: 15px;
            color: #23272e;
            word-break: break-all;
            font-weight: bold;
            text-shadow: 0 1px 0 #fffbe6;
        }
        .card-stats {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 8px 6px 8px;
        }
        .atk, .hp {
            font-size: 16px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 8px;
            box-shadow: 0 1px 4px #0004;
        }
        .atk {
            background: linear-gradient(90deg, #ff4d4f 60%, #ffbaba 100%);
            color: #fff;
            border: 1.5px solid #ff4d4f;
        }
        .hp {
            background: linear-gradient(90deg, #52c41a 60%, #baffb6 100%);
            color: #fff;
            border: 1.5px solid #52c41a;
        }
        .zone {
            min-width: 700px;
            min-height: 170px;
            border-radius: 12px;
            border: 2px dashed rgba(0,234,255,0.18);
            margin: 0 auto 18px auto;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 18px;
            background: rgba(255,255,255,0.03);
        }
        .zone.over {
            border-color: #00eaff;
            background: rgba(0,234,255,0.08);
        }
        .battle-log {
            background: #181c22;
            border-radius: 8px;
            padding: 10px 18px;
            margin: 18px auto 0 auto;
            max-width: 700px;
            min-height: 40px;
            font-size: 15px;
            color: #ffd700;
            display: none;
        }
        .battle-log.active {
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="money" id="money">💰 100</div>
        <div class="timer-area">
            <div class="timer" id="timer">120</div>
            <button class="start-btn" id="startBattle">开始战斗</button>
        </div>
        <div class="sell-area" id="sellArea">出售区</div>
    </div>
    <div class="shop zone" id="shop">
        <button class="shop-refresh-btn" id="refreshShop">刷新商店（3💰）</button>
    </div>
    <div class="battlefield zone" id="battlefield"></div>
    <div class="hand zone" id="hand"></div>
    <div class="battle-log" id="battleLog"></div>
</div>
<script>
// 卡牌池
const cardPool = [
    "bairao.png","bocai.png","busi.png","caifuren.png","caiwenji.png","caiyong.png","caoang.png","caojie.png","caojinyu.png","caopi.png","caoren.png","caoren_02.png","caoxiu.png","caoyi.png","chendeng.png","chengpu.png","chengui.png","chengyu.png","chengyuanzhi.png","chenwu.png","chunyuqiong.png","daqiao.png","dengai.png","dengmao.png","dianwei.png","diaochan.png","dingfeng.png","dongbai.png","dongcheng.png","dongguiren.png","dongwan.png","dongxi.png","dongxie.png","dongxu.png","duanwei.png","empty_01.png","empty_02.png","fanchou.png","fazheng.png","fengfang.png","fengyu.png","fuwan.png","ganning.png","ganning_02.png","gaolan.png","gaosheng.png","gexuan.png","guanhai.png","guanning.png","guanxing.png","guanyinping.png","guanyu.png","guanyu_02.png","guojia.png","guosheng.png","guosi.png","guotu.png","handang.png","hanfu.png","hanmeng.png","hansui.png","hejin.png","heman.png","hetaihou.png","huangchengyan.png","huangfusong.png","huanggai.png","huangyueying.png","huangzhong.png","huatuo.png","huaxiong.png","hucheer.png","huochuan.png","jiahua.png","jiangwan.png","jiangwei.png","jiaxu.png","jiling.png","jiping.png","jushou.png","laiyinger.png","leibo.png","leitong.png","liaohua.png","lijue.png","lingtong.png","lisu.png","liubian.png","liubiao.png","liuhong.png","liupi.png","liushan.png","liuyao.png","liuyong.png","lusu.png","luxun.png","luxun_02.png","luzhi.png","lvbu.png","lvmeng.png","lvmeng_02.png","machao.png","madai.png","malingli.png","mateng.png","matie.png","maxiu.png","mayuanyi.png","mayunlu.png","miheng.png","mizhu.png","mizhu_02.png","nanhualaoxian.png","panfeng.png","pangde.png","pangdegong.png","pangji.png","pangtong.png","peiyuanshao.png","qiaorui.png","qinmi.png","quyi.png","shenluxun.png","shenmachao.png","shenpei.png","shenzhangfei.png","shixie.png","simahui.png","simayi.png","suigu.png","sunce.png","sunjian.png","sunshangxiang.png","sunyi.png","taishici.png","tangji.png","taoqian.png","taosheng.png","tianfeng.png","tianshangyi.png","tongyuan.png","wangrong.png","wangyun.png","wanniangongzhu.png","weiyan.png","weiyan_02.png","wenchou.png","wulan.png","xiahoudun.png","xiahoudun_02.png","xiahouyuan.png","xiaoqiao.png","xingdaorong.png","xizhicai.png","xuchu.png","xuchu_02.png","xuelingyun.png","xugong.png","xunchen.png","xunyu.png","xurong.png","xushao.png","xusheng.png","xushu.png","xuyou.png","yanfuren.png","yangbiao.png","yanghong.png","yangwan.png","yanliang.png","yanzheng.png","yuanshao.png","yuanshu.png","yuanyin.png","yudu.png","yuejiu.png","yuji.png","zhangbao.png","zhangbao_01.png","zhangchu.png","zhangchu_02.png","zhangfei.png","zhanghe.png","zhangheng.png","zhanghong.png","zhangji.png","zhangkai.png","zhangliang.png","zhangliao.png","zhanglu.png","zhangmancheng.png","zhangning.png","zhangrang.png","zhangxingcai.png","zhangyan.png","zhangzhao.png","zhaoyun.png","zhaozhong.png","zhenji.png","zhenji_02.png","zhonghui.png","zhoucang.png","zhoushan.png","zhouyu.png","zhugeliang.png","zhujun.png","zoushi.png","zuoci.png"
];

// 生成卡牌属性
function randomStats() {
    return {
        atk: Math.floor(Math.random()*9)+1,
        hp: Math.floor(Math.random()*9)+1
    };
}

// 卡牌对象池
const cardStatsMap = {};
cardPool.forEach(name => {
    cardStatsMap[name] = randomStats();
});

let money = 100;
let timer = 120;
let timerInterval = null;
let shopCards = [];
let handCards = [];
let fieldCards = [];
let battleMode = false;

const shopEl = document.getElementById('shop');
const handEl = document.getElementById('hand');
const fieldEl = document.getElementById('battlefield');
const moneyEl = document.getElementById('money');
const timerEl = document.getElementById('timer');
const sellAreaEl = document.getElementById('sellArea');
const battleLogEl = document.getElementById('battleLog');
const startBattleBtn = document.getElementById('startBattle');

function updateMoney() {
    moneyEl.textContent = `💰 ${money}`;
}

function updateTimer() {
    timerEl.textContent = timer;
}

function renderShop() {
    shopEl.innerHTML = '';
    shopCards.forEach((card, idx) => {
        const cardEl = createCardElement(card, 'shop', idx);
        shopEl.appendChild(cardEl);
    });
    // 补足空位
    for(let i=shopCards.length;i<6;i++){
        const empty = document.createElement('div');
        empty.className = 'card';
        empty.style.opacity = '0.2';
        shopEl.appendChild(empty);
    }
}

function renderHand() {
    handEl.innerHTML = '';
    handCards.forEach((card, idx) => {
        const cardEl = createCardElement(card, 'hand', idx);
        handEl.appendChild(cardEl);
    });
    for(let i=handCards.length;i<10;i++){
        const empty = document.createElement('div');
        empty.className = 'card';
        empty.style.opacity = '0.1';
        handEl.appendChild(empty);
    }
}

function renderField() {
    fieldEl.innerHTML = '';
    fieldCards.forEach((card, idx) => {
        const cardEl = createCardElement(card, 'field', idx);
        fieldEl.appendChild(cardEl);
    });
    for(let i=fieldCards.length;i<7;i++){
        const empty = document.createElement('div');
        empty.className = 'card';
        empty.style.opacity = '0.1';
        fieldEl.appendChild(empty);
    }
}

function createCardElement(card, zone, idx) {
    const div = document.createElement('div');
    div.className = 'card';
    div.draggable = !battleMode;
    div.dataset.zone = zone;
    div.dataset.idx = idx;
    div.dataset.name = card.name;
    div.innerHTML = `<img src="../assets/card/${card.name}" alt="${card.name}"><div class="card-name">${card.name.replace(/\.png$/,'')}</div><div class="card-stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
    // 拖拽事件
    div.addEventListener('dragstart', dragStart);
    div.addEventListener('dragend', dragEnd);
    return div;
}

function dragStart(e) {
    if(battleMode) return;
    e.dataTransfer.setData('text/plain', JSON.stringify({zone: this.dataset.zone, idx: this.dataset.idx}));
    this.classList.add('dragging');
}
function dragEnd(e) {
    this.classList.remove('dragging');
}

function setupDropZones() {
    [shopEl, handEl, fieldEl, sellAreaEl].forEach(zone => {
        zone.addEventListener('dragover', e => {
            e.preventDefault();
            zone.classList.add('over');
        });
        zone.addEventListener('dragleave', e => {
            zone.classList.remove('over');
        });
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('over');
            const data = JSON.parse(e.dataTransfer.getData('text/plain'));
            handleDrop(zone, data);
        });
    });
}

function handleDrop(zone, data) {
    if(battleMode) return;
    // 商店到手牌
    if(zone===handEl && data.zone==='shop'){
        if(handCards.length>=10) return;
        if(money<3) return;
        const card = shopCards.splice(data.idx,1)[0];
        handCards.push(card);
        money -= 3;
        updateMoney();
        renderShop();
        renderHand();
    }
    // 手牌到上阵
    else if(zone===fieldEl && data.zone==='hand'){
        if(fieldCards.length>=7) return;
        const card = handCards.splice(data.idx,1)[0];
        fieldCards.push(card);
        renderHand();
        renderField();
    }
    // 上阵到出售
    else if(zone===sellAreaEl && data.zone==='field'){
        const card = fieldCards.splice(data.idx,1)[0];
        money += 1;
        updateMoney();
        renderField();
    }
    // 手牌到出售
    else if(zone===sellAreaEl && data.zone==='hand'){
        const card = handCards.splice(data.idx,1)[0];
        money += 1;
        updateMoney();
        renderHand();
    }
}

function refreshShop() {
    shopCards = [];
    let pool = [...cardPool];
    for(let i=0;i<6;i++){
        if(pool.length===0) break;
        const idx = Math.floor(Math.random()*pool.length);
        const name = pool.splice(idx,1)[0];
        shopCards.push({name, ...cardStatsMap[name]});
    }
    renderShop();
}

function startTimer() {
    timer = 120;
    updateTimer();
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        timer--;
        updateTimer();
        if(timer<=0){
            clearInterval(timerInterval);
            enterBattle();
        }
    },1000);
}

startBattleBtn.onclick = () => {
    if(battleMode) return;
    clearInterval(timerInterval);
    enterBattle();
};

function enterBattle() {
    battleMode = true;
    battleLogEl.classList.add('active');
    battleLogEl.innerHTML = '<b>战斗开始！</b>';
    // 生成敌方卡牌
    let enemyField = [];
    let pool = [...cardPool];
    for(let i=0;i<fieldCards.length;i++){
        if(pool.length===0) break;
        const idx = Math.floor(Math.random()*pool.length);
        const name = pool.splice(idx,1)[0];
        enemyField.push({name, ...cardStatsMap[name]});
    }
    renderBattlefield(fieldCards, enemyField);
    setTimeout(()=>{
        autoBattle(fieldCards, enemyField);
    }, 1000);
}

function renderBattlefield(my, enemy) {
    fieldEl.innerHTML = '';
    // 敌方
    enemy.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card';
        div.style.background = '#2e3a4b';
        div.innerHTML = `<img src="../assets/card/${card.name}" alt="${card.name}"><div class="card-name">${card.name.replace(/\.png$/,'')}</div><div class="card-stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
        fieldEl.appendChild(div);
    });
    // 间隔
    const sep = document.createElement('div');
    sep.style.width = '30px';
    fieldEl.appendChild(sep);
    // 我方
    my.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="../assets/card/${card.name}" alt="${card.name}"><div class="card-name">${card.name.replace(/\.png$/,'')}</div><div class="card-stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
        fieldEl.appendChild(div);
    });
}

function autoBattle(my, enemy) {
    let myField = my.map(card => ({...card}));
    let enemyField = enemy.map(card => ({...card}));
    let log = [];
    let turn = 0;
    function step() {
        if(myField.length===0||enemyField.length===0){
            finishBattle(myField.length>0);
            return;
        }
        let attacker, defender, attackerSide;
        if(turn%2===0){ // 我方
            if(myField.length===0) { finishBattle(false); return; }
            attackerSide = '我方';
            attacker = myField[turn/2%myField.length];
            if(enemyField.length===0) { finishBattle(true); return; }
            const idx = Math.floor(Math.random()*enemyField.length);
            defender = enemyField[idx];
        }else{ // 敌方
            if(enemyField.length===0) { finishBattle(true); return; }
            attackerSide = '敌方';
            attacker = enemyField[Math.floor(turn/2)%enemyField.length];
            if(myField.length===0) { finishBattle(false); return; }
            const idx = Math.floor(Math.random()*myField.length);
            defender = myField[idx];
        }
        // 攻击
        log.push(`${attackerSide}【${attacker.name.replace(/\.png$/,'')}】攻击【${defender.name.replace(/\.png$/,'')}】，造成${attacker.atk}伤害，自己受到${defender.atk}反击`);
        defender.hp -= attacker.atk;
        attacker.hp -= defender.atk;
        // 移除死亡
        if(defender.hp<=0){
            if(turn%2===0) enemyField = enemyField.filter(c=>c!==defender);
            else myField = myField.filter(c=>c!==defender);
        }
        if(attacker.hp<=0){
            if(turn%2===0) myField = myField.filter(c=>c!==attacker);
            else enemyField = enemyField.filter(c=>c!==attacker);
        }
        renderBattlefield(myField, enemyField);
        battleLogEl.innerHTML = log.map(l=>`<div>${l}</div>`).join('');
        turn++;
        setTimeout(step, 1200);
    }
    step();
}

function finishBattle(win) {
    setTimeout(()=>{
        battleLogEl.innerHTML += `<div><b>${win?'你胜利了！':'你失败了！'} 返回购买阶段。</b></div>`;
        setTimeout(()=>{
            battleMode = false;
            battleLogEl.classList.remove('active');
            refreshShop();
            renderHand();
            renderField();
            startTimer();
        }, 2000);
    }, 1000);
}

// 刷新按钮
document.getElementById('refreshShop').onclick = function() {
    if (battleMode) return;
    if (money < 3) return;
    money -= 3;
    updateMoney();
    refreshShop();
};

// 初始化
refreshShop();
renderHand();
renderField();
setupDropZones();
updateMoney();
startTimer();
</script>
</body>
</html>
