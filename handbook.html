<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡牌图鉴</title>
  <style>
    :root {
      --bg-top: #f3ead8;
      --bg-bottom: #d2b58a;
      --ink: #2a1d11;
      --muted: #6f5c47;
      --panel: rgba(255, 249, 241, 0.82);
      --panel-strong: rgba(255, 250, 244, 0.95);
      --line: rgba(94, 65, 35, 0.16);
      --accent: #965327;
      --accent-soft: rgba(150, 83, 39, 0.12);
      --shadow: rgba(45, 28, 12, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 26%),
        radial-gradient(circle at right 20%, rgba(151, 93, 45, 0.16), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 92%);
      opacity: 0.45;
    }

    .app {
      width: min(1400px, calc(100vw - 32px));
      margin: 24px auto;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 251, 246, 0.76), rgba(255, 245, 233, 0.84));
      box-shadow: 0 24px 80px var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 20px;
    }

    .hero-card,
    .toolbar,
    .empty {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      padding: 28px;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -60px;
      bottom: -80px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(150, 83, 39, 0.22), transparent 70%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
    }

    .subtitle {
      max-width: 56ch;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .stat {
      min-width: 120px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(150, 83, 39, 0.1);
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 28px;
      line-height: 1;
    }

    .toolbar {
      padding: 22px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 22px;
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .search {
      display: grid;
      gap: 10px;
    }

    .search label,
    .switch-row span {
      font-size: 14px;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 1px solid rgba(120, 85, 51, 0.18);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      color: var(--ink);
      background: var(--panel-strong);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search input:focus {
      border-color: rgba(150, 83, 39, 0.55);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .switch-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.62);
    }

    .switch {
      position: relative;
      width: 56px;
      height: 32px;
      display: inline-block;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      border-radius: 999px;
      background: rgba(118, 92, 62, 0.24);
      transition: background 0.2s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease;
    }

    .switch input:checked + .slider {
      background: rgba(150, 83, 39, 0.9);
    }

    .switch input:checked + .slider::before {
      transform: translateX(24px);
    }

    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .results-bar strong {
      color: var(--ink);
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
    }

    .card-item {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 250, 244, 0.9);
      box-shadow: 0 12px 28px rgba(61, 40, 18, 0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: rise 0.45s ease both;
    }

    .card-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 34px rgba(61, 40, 18, 0.14);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 332 / 460;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.44), transparent),
        linear-gradient(145deg, #f2debf, #c8955e);
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .variant-tag {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(42, 29, 17, 0.8);
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .card-body {
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .card-name {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
      word-break: break-word;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .card-meta code {
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
      color: var(--accent);
      background: rgba(150, 83, 39, 0.08);
      padding: 3px 7px;
      border-radius: 999px;
    }

    .empty {
      display: none;
      place-items: center;
      min-height: 260px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty.show {
      display: grid;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: calc(100vw - 20px);
        margin: 10px auto;
        padding: 16px;
        border-radius: 20px;
      }

      .hero-card,
      .toolbar,
      .empty,
      .card-item {
        border-radius: 18px;
      }

      .hero-card,
      .toolbar {
        padding: 18px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .results-bar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <article class="hero-card">
        <span class="eyebrow">H5 CARD INDEX</span>
        <h1>卡牌图鉴</h1>
        <p class="subtitle">
          基于 `assets/card` 目录自动整理的素材预览页。当前先按图片文件名生成展示，方便你快速核对卡面、命名与变体版本，后续我们可以继续补阵营、星级、技能和酒馆分层。
        </p>
        <div class="stats">
          <div class="stat">
            <span class="stat-label">图片总数</span>
            <strong id="total-count">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">去重角色</span>
            <strong id="unique-count">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">当前结果</span>
            <strong id="visible-count">0</strong>
          </div>
        </div>
      </article>

      <aside class="toolbar">
        <h2>筛选与检索</h2>
        <p>支持按文件名搜索。默认会展示所有卡图，包含 `_01`、`_02` 这种同名角色的不同版本。</p>
        <div class="search">
          <label for="search-input">搜索文件名或卡牌名</label>
          <input id="search-input" type="search" placeholder="例如 guanyu / zhenji / shen">
        </div>
        <div class="switch-row">
          <span>隐藏占位素材 `empty_*`</span>
          <label class="switch">
            <input id="hide-empty-toggle" type="checkbox" checked>
            <span class="slider"></span>
          </label>
        </div>
      </aside>
    </section>

    <section class="results-bar">
      <div>当前展示 <strong id="result-text">0</strong> 张卡牌</div>
      <div id="hint-text">按文件名升序排列</div>
    </section>

    <section class="grid" id="card-grid" aria-label="卡牌图鉴列表"></section>
    <section class="empty" id="empty-state">
      <div>
        <h3>没有找到匹配的卡牌</h3>
        <p>可以换一个关键词，或者关闭“隐藏占位素材”再试试。</p>
      </div>
    </section>
  </main>

      'assets/card/zuoci.png'

    const cardGrid = document.getElementById("card-grid");
    const searchInput = document.getElementById("search-input");
    const hideEmptyToggle = document.getElementById("hide-empty-toggle");
    const totalCount = document.getElementById("total-count");
    const uniqueCount = document.getElementById("unique-count");
    const visibleCount = document.getElementById("visible-count");
    const resultText = document.getElementById("result-text");
    const emptyState = document.getElementById("empty-state");

    function parseCard(path) {
      const fileName = path.split("/").pop();
      const stem = fileName.replace(/\.[^.]+$/, "");
      const match = stem.match(/^(.*?)(?:_(\d+))?$/);
      const baseName = match ? match[1] : stem;
      const variant = match && match[2] ? match[2] : "";
      const displayName = baseName.replace(/_/g, " ");
      const isPlaceholder = baseName === "empty";

      return {
        path,
        fileName,
        stem,
        baseName,
        variant,
        displayName,
        isPlaceholder
      };
    }

    const cards = cardPaths.map(parseCard);
    const uniqueBaseCount = new Set(cards.map((card) => card.baseName)).size;

    function createCardElement(card, index) {
      const article = document.createElement("article");
      article.className = "card-item";
      article.style.animationDelay = `${Math.min(index * 0.015, 0.28)}s`;
      article.innerHTML = `
        <div class="thumb-wrap">
          <img src="${card.path}" alt="${card.displayName}">
          ${card.variant ? `<span class="variant-tag">变体 ${card.variant}</span>` : ""}
        </div>
        <div class="card-body">
          <h3 class="card-name">${card.displayName}</h3>
          <div class="card-meta">
            <span>${card.variant ? `版本 ${card.variant}` : "基础版"}</span>
            <code>${card.fileName}</code>
          </div>
        </div>
      `;
      return article;
    }

    function renderCards() {
      const keyword = searchInput.value.trim().toLowerCase();
      const hideEmpty = hideEmptyToggle.checked;

      const filteredCards = cards.filter((card) => {
        if (hideEmpty && card.isPlaceholder) {
          return false;
        }

        if (!keyword) {
          return true;
        }

        return [
          card.fileName,
          card.stem,
          card.baseName,
          card.displayName
        ].some((value) => value.toLowerCase().includes(keyword));
      });

      cardGrid.innerHTML = "";
      filteredCards.forEach((card, index) => {
        cardGrid.appendChild(createCardElement(card, index));
      });

      totalCount.textContent = String(cards.length);
      uniqueCount.textContent = String(uniqueBaseCount);
      visibleCount.textContent = String(filteredCards.length);
      resultText.textContent = String(filteredCards.length);
      emptyState.classList.toggle("show", filteredCards.length === 0);
    }

    searchInput.addEventListener("input", renderCards);
    hideEmptyToggle.addEventListener("change", renderCards);

    renderCards();
  </script>
